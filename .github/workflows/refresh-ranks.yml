name: refresh-ranks

on:
  schedule:
    - cron: "0 0 * * 1"  # Monday 00:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: refresh-ranks
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Setup Python 3.13
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"

      - name: Install deps
        run: uv sync --frozen --group dev

      - name: Fetch leaderboards + regenerate models.md
        run: |
          uv run python scripts/fetch_leaderboards.py
          uv run python scripts/gen_models_table.py
          uv run pytest tests/test_models.py tests/test_fetch_leaderboards.py tests/test_gen_models_table.py -v

      - name: Detect changes
        id: diff
        run: |
          if git diff --quiet -- src/imagine_mcp/models.py docs/models.md data/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open PR if changed
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          BRANCH="bot/refresh-ranks-${DATE}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "${BRANCH}"
          git add src/imagine_mcp/models.py docs/models.md data/
          git commit -m "feat: refresh model ranks from leaderboards (${DATE})"
          git push -u origin "${BRANCH}"
          gh pr create \
            --title "feat: refresh model ranks from leaderboards (${DATE})" \
            --body "Automated weekly rank refresh from Artificial Analysis + LMArena. Review diff to verify no parser regressions." \
            --label "bot,rank-refresh"

      - name: File issue on parser failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "refresh-ranks failed $(date -u +%Y-%m-%d)" \
            --body "Weekly rank refresh workflow failed. Check run ${{ github.run_id }} for parser errors or HTML structure changes." \
            --label "bot,rank-refresh,bug"
