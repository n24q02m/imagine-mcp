name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  pull_request_target:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]
  issues:
    types:
      - opened
      - reopened

permissions:
  contents: read
  pull-requests: write

jobs:
  pr-title:
    name: Validate PR title (Conventional Commits subset)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2
        with:
          egress-policy: audit
      - uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Per repo rule (feedback_commit_prefix.md): only feat: and fix:
          # are allowed. Squash-merge uses the PR title as the commit
          # message and bypasses the local enforce-commit pre-commit hook,
          # so this server-side check is required to keep main history
          # conformant. See historical violations on commits 2bc6657, 76,
          # 77 (closed before this gate was wired).
          # perf: dropped -- it is not in this repo's own PSR
          # commit_parser_options.allowed_tags (pyproject.toml, only
          # feat/fix), so a perf: commit that passed this check would still
          # silently fail to bump the version, defeating the point of the
          # gate.
          types: |
            fix
            feat
          requireScope: false
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: |
            The subject must not start with an uppercase character.

  lint-and-test:
    name: Lint & Test (${{ matrix.os }})
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    env:
      UV_NO_SOURCES: "true"

    steps:
      - name: Harden Runner
        if: matrix.os == 'ubuntu-latest'
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Setup Python 3.13
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --group dev --no-sources

      - name: Run Ruff check
        run: uv run --no-sync ruff check .

      - name: Run Ruff format check
        run: uv run --no-sync ruff format --check .

      - name: Run ty type check
        run: uv run --no-sync ty check

      - name: Run tests with coverage
        run: uv run --no-sync pytest --tb=short --cov=imagine_mcp --cov-report=xml

      - name: Upload coverage to Codecov
        if: github.event_name == 'push' && matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          files: coverage.xml

      - name: Setup Bun (worker tests)
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Install worker dependencies
        run: bun install --frozen-lockfile

      - name: Run worker tests
        run: bun run test:worker

  # NOTE: CodeQL analysis is handled by GitHub's default setup for this public
  # repo (see Security -> Code scanning). Workflow-based CodeQL conflicts with
  # default setup ("CodeQL analyses from advanced configurations cannot be
  # processed when the default setup is enabled"). Disable default setup in
  # repo settings if you prefer workflow-driven analysis.

  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Dependency Review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: moderate
          comment-summary-in-pr: always

  email-notify:
    name: Email Notification
    if: >-
      (github.event_name == 'issues' || github.event_name == 'pull_request_target')
      && github.actor != 'n24q02m'
      && github.event.sender.type != 'Bot'
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2
        with:
          egress-policy: audit

      - name: Parse SMTP credential
        run: |
          echo "SMTP_USER=${SMTP_CREDENTIAL%%:*}" >> $GITHUB_ENV
          echo "SMTP_PASS=${SMTP_CREDENTIAL#*:}" >> $GITHUB_ENV
        env:
          SMTP_CREDENTIAL: ${{ secrets.SMTP_CREDENTIAL }}

      - name: Send email notification
        uses: dawidd6/action-send-mail@94de994a9f6fffee200243214e17002e2920bb59 # v18
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ env.SMTP_USER }}
          password: ${{ env.SMTP_PASS }}
          subject: >-
            [${{ github.event.repository.name }}]
            ${{ github.event_name == 'issues' && 'Issue' || 'PR' }}
            #${{ github.event.issue.number || github.event.pull_request.number }}:
            ${{ github.event.issue.title || github.event.pull_request.title }}
          to: ${{ env.SMTP_USER }}
          from: GitHub Notify <${{ env.SMTP_USER }}>
          body: |
            ${{ github.event_name == 'issues' && 'New issue' || 'New pull request' }} in ${{ github.repository }}

            Title: ${{ github.event.issue.title || github.event.pull_request.title }}
            Author: ${{ github.actor }}
            URL: ${{ github.event.issue.html_url || github.event.pull_request.html_url }}
            Action: ${{ github.event.action }}

            ---
            ${{ github.event.issue.body || github.event.pull_request.body || 'No description provided.' }}
