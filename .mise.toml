[tools]
python = "3.13"
uv = "latest"

[tasks.setup]
description = "Setup development environment"
run = [
    "mise install",
    "uv sync --group dev",
    "uv pip install pre-commit",
    "uv run pre-commit install",
    "uv run pre-commit install --hook-type commit-msg",
    "echo 'Setup complete!'",
]

[tasks.lint]
description = "Run all quality checks (ruff + ty)"
run = [
    "uv run ruff check .",
    "uv run ruff format --check .",
    "uv run ty check",
]

[tasks.test]
description = "Run tests"
run = "uv run pytest"

[tasks.fix]
description = "Auto-fix formatting and linting issues"
run = [
    "uv run ruff check --fix .",
    "uv run ruff format .",
]

[tasks.dev]
description = "Run server in dev mode (http local relay)"
run = "uv run imagine-mcp"

[tasks.refresh-ranks]
description = "Fetch leaderboards, update models.py quality_rank, regen docs/models.md, save snapshot"
run = [
    "uv run python scripts/fetch_leaderboards.py",
    "uv run python scripts/gen_models_table.py",
    "uv run pytest tests/test_models.py tests/test_fetch_leaderboards.py tests/test_gen_models_table.py -v",
]

[tasks.refresh-ranks-check]
description = "Verify docs/models.md is in sync with src/imagine_mcp/models.py"
run = "uv run python scripts/gen_models_table.py --check"
